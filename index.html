<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Defensive Shield for window.fetch override issue -->
    <script>
      try {
        const originalFetch = window.fetch;
        let currentFetch = originalFetch;
        Object.defineProperty(window, 'fetch', {
          configurable: true,
          enumerable: true,
          get() {
            return currentFetch;
          },
          set(value) {
            currentFetch = value;
          }
        });
      } catch (e) {
        console.warn('Unable to define window.fetch property shield:', e);
      }
    </script>

    <title>Websmith | Custom Website Design & Development in India</title>
    <meta name="description" content="Websmith builds SEO-friendly, mobile-responsive business websites for boutiques, clinics, cafes, and local brands across India in 5-7 days." />
